<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Achievement Dashboard</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Elegant Custom Animations */
    @keyframes purple-glow {
      0%, 100% {
        transform: scale(1);
        filter: drop-shadow(0 0 4px rgba(168, 85, 247, 0.6)) drop-shadow(0 0 10px rgba(168, 85, 247, 0.4));
      }
      50% {
        transform: scale(1.12);
        filter: drop-shadow(0 0 15px rgba(168, 85, 247, 0.9)) drop-shadow(0 0 25px rgba(168, 85, 247, 0.6));
      }
    }
    .animate-purple-star {
      animation: purple-glow 2s infinite ease-in-out;
    }
    /* Smooth page fade transition */
    .fade-in {
      animation: fadeIn 0.4s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans antialiased">

  <!-- Main Container -->
  <main class="container mx-auto px-4 py-8 max-w-4xl">
    
    <!-- Loading Spinner Overlay -->
    <div id="loading" class="fixed inset-0 bg-slate-950/80 flex flex-col items-center justify-center z-50">
      <div class="animate-spin rounded-full h-12 w-12 border-4 border-amber-500 border-t-transparent mb-4"></div>
      <p class="text-amber-400 font-medium tracking-wide">Fetching student records...</p>
    </div>

    <!-- PAGE 1: HOME SCREEN (STUDENT SELECTION) -->
    <section id="home-page" class="hidden fade-in text-center py-10">
      <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight mb-2 bg-gradient-to-r from-amber-200 via-yellow-400 to-amber-200 bg-clip-text text-transparent">
        Student Achievements
      </h1>
      <p class="text-slate-400 mb-12 text-sm md:text-base">Select your profile to view your badges and stars</p>
      
      <!-- Gold Border Cards Grid -->
      <div id="student-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 justify-center max-w-3xl mx-auto">
        <!-- Rendered dynamically via JS -->
      </div>
    </section>

    <!-- PAGE 2: STUDENT DETAIL SCREEN -->
    <section id="detail-page" class="hidden fade-in max-w-2xl mx-auto">
      <!-- Back Button -->
      <button onclick="showHomePage()" class="group mb-6 inline-flex items-center gap-2 text-sm text-slate-400 hover:text-amber-400 transition-colors bg-slate-800/50 hover:bg-slate-800 px-4 py-2 rounded-full border border-slate-700/50">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transform group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
        Back to All Students
      </button>

      <!-- Student Profile Card Container -->
      <div class="bg-slate-800/40 border border-slate-700/60 rounded-3xl p-6 md:p-8 backdrop-blur-sm shadow-xl">
        
        <!-- Top Profile Info -->
        <div class="flex flex-col items-center text-center border-b border-slate-700/50 pb-6 mb-6">
          <div class="w-28 h-28 rounded-2xl bg-slate-700/30 border-2 border-slate-600/50 p-1 mb-4 overflow-hidden shadow-inner">
            <img id="detail-avatar" src="" alt="Student Profile" class="w-full h-full object-cover rounded-xl onError='this.src=\"https://placehold.co/150\"'">
          </div>
          <h2 id="detail-name" class="text-2xl md:text-3xl font-bold text-white tracking-wide"></h2>
        </div>

        <!-- Middle Section: Badges -->
        <div class="mb-8">
          <h3 class="text-xs uppercase font-semibold text-slate-400 tracking-widest mb-4 text-center sm:text-left">Earned Badges</h3>
          <div id="badge-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-3">
            <!-- Rendered dynamically via JS -->
          </div>
        </div>

        <!-- Bottom Section: Stars List -->
        <div>
          <h3 class="text-xs uppercase font-semibold text-slate-400 tracking-widest mb-4 text-center sm:text-left">Star Ledger</h3>
          <div id="star-categories-container" class="space-y-4">
            <!-- Rendered dynamically via JS -->
          </div>
        </div>

      </div>
    </section>

  </main>

  <!-- Frontend Logic App Script -->
  <script>
    // Your verified Live API URL
    const API_URL = 'https://script.google.com/macros/s/AKfycbzE30AC5lc7_6JMeDGFeZohNGEwMQ5BdZfnlBTl0ai6kzM2e56Uac7Q0InOJAZ5GrUJ1A/exec';
    
    let studentsData = [];

    // Criteria Mapping for Reference and Rendering
    const starCriteria = {
      Gold: { label: 'Academic Excellence', color: 'text-yellow-400', bg: 'bg-yellow-400/10', border: 'border-yellow-400/30', desc: 'High test scores & accurate problem solving.' },
      Green: { label: 'Good Effort & Hard Work', color: 'text-green-400', bg: 'bg-green-400/10', border: 'border-green-400/30', desc: 'Completing tasks neatly & persistent work.' },
      Blue: { label: 'Active Participation', color: 'text-blue-400', bg: 'bg-blue-400/10', border: 'border-blue-400/30', desc: 'Eager answering & active during activities.' },
      Red: { label: 'Good Behavior & Kindness', color: 'text-red-400', bg: 'bg-red-400/10', border: 'border-red-400/30', desc: 'Following rules & helping peers politely.' },
      Purple: { label: 'Special Accomplishment', color: 'text-purple-400', bg: 'bg-purple-400/10', border: 'border-purple-400/30', desc: 'Special recognition star.', specialAnim: true }
    };

    // Load Data Initialization
    window.addEventListener('DOMContentLoaded', fetchDashboardData);

    async function fetchDashboardData() {
      try {
        const response = await fetch(API_URL);
        studentsData = await response.json();
        renderHomeGrid();
        showHomePage();
      } catch (error) {
        console.error('Error retrieving data:', error);
        alert('Failed to connect to Google Sheets. Check your deployment link configuration.');
      } finally {
        document.getElementById('loading').classList.add('hidden');
      }
    }

    // Render Page 1: Roster Grid
    function renderHomeGrid() {
      const grid = document.getElementById('student-grid');
      grid.innerHTML = '';

      studentsData.forEach((student, index) => {
        const card = document.createElement('div');
        // Elegant Glowing Gold Border Styles Applied here
        card.className = `
          bg-slate-800/80 rounded-2xl p-6 border border-amber-500/40 shadow-[0_0_15px_rgba(245,158,11,0.05)]
          hover:border-amber-400 hover:shadow-[0_0_25px_rgba(245,158,11,0.25)] 
          cursor:pointer transform hover:-translate-y-1 transition-all duration-300 flex flex-col items-center justify-center min-h-[140px]
        `;
        card.onclick = () => showStudentDetails(index);
        card.innerHTML = `
          <span class="text-xs font-semibold uppercase tracking-wider text-amber-500/80 mb-2">Student Profile</span>
          <h3 class="text-xl font-bold text-white tracking-wide text-center">${student.Name}</h3>
        `;
        grid.appendChild(card);
      });
    }

    // Navigation Helper Functions
    function showHomePage() {
      document.getElementById('detail-page').classList.add('hidden');
      document.getElementById('home-page').classList.remove('hidden');
    }

    // Render Page 2: Individual Analytics
    function showStudentDetails(index) {
      const student = studentsData[index];
      
      document.getElementById('home-page').classList.add('hidden');
      document.getElementById('detail-page').classList.remove('hidden');

      // Populate basic details
      document.getElementById('detail-name').innerText = student.Name;
      // Looks for image matching configuration natively or falls back directly to absolute assets route
      document.getElementById('detail-avatar').src = student.Image ? student.Image : `images/${student.Image}`;

      // Build out Milestone Badges Logic
      const badgeContainer = document.getElementById('badge-container');
      badgeContainer.innerHTML = '';

      const badgesConfig = [
        { key: 'Gold', target: 5, icon: '🏆', title: 'Academic Master' },
        { key: 'Green', target: 5, icon: '💪', title: 'Hard Worker' },
        { key: 'Blue', target: 5, icon: '🗣️', title: 'Super Participant' },
        { key: 'Red', target: 5, icon: '❤️', title: 'Kindness Hero' },
        { key: 'Purple', target: 1, icon: '⭐', title: 'Class Star' }
      ];

      badgesConfig.forEach(badge => {
        const currentCount = student[badge.key] || 0;
        const isUnlocked = currentCount >= badge.target;
        
        const element = document.createElement('div');
        element.className = `flex flex-col items-center p-3 rounded-xl border text-center transition-all ${
          isUnlocked 
            ? 'bg-slate-700/40 border-slate-600/60 text-white shadow-md scale-100' 
            : 'bg-slate-900/30 border-slate-800/80 text-slate-600 opacity-40 select-none'
        }`;
        
        element.innerHTML = `
          <div class="text-2xl mb-1 filter ${isUnlocked ? '' : 'grayscale'}">${badge.icon}</div>
          <div class="text-[10px] font-bold leading-tight tracking-wide">${badge.title}</div>
          <div class="text-[9px] mt-1 font-medium ${isUnlocked ? 'text-amber-400' : 'text-slate-600'}">
            ${isUnlocked ? 'Unlocked' : `${currentCount}/${badge.target}`}
          </div>
        `;
        badgeContainer.appendChild(element);
      });

      // Build out Rows displaying individual Star Ledger
      const starsListContainer = document.getElementById('star-categories-container');
      starsListContainer.innerHTML = '';

      Object.keys(starCriteria).forEach(key => {
        const config = starCriteria[key];
        const count = student[key] || 0;

        const row = document.createElement('div');
        row.className = `p-4 rounded-xl border ${config.bg} ${config.border} flex flex-col sm:flex-row sm:items-center justify-between gap-3`;

        // Generate stars visuals string inline block safely
        let starsHTML = '';
        if (count === 0) {
          starsHTML = `<span class="text-sm text-slate-500 font-medium italic">No stars yet</span>`;
        } else {
          for (let i = 0; i < count; i++) {
            // Check if special pulsing effect is configured for Purple category elements
            const animClass = config.specialAnim ? 'animate-purple-star inline-block' : '';
            starsHTML += `
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 ${config.color} ${animClass} fill-current" viewBox="0 0 20 20">
                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
              </svg>
            `;
          }
        }

        row.innerHTML = `
          <div class="flex-1">
            <div class="flex items-center gap-2 mb-0.5">
              <span class="w-2.5 h-2.5 rounded-full ${config.color.replace('text', 'bg')}"></span>
              <h4 class="font-bold text-sm tracking-wide text-white">${config.label}</h4>
              <span class="ml-auto sm:ml-0 px-2 py-0.5 rounded bg-slate-900/60 border border-slate-700/40 text-xs font-mono font-bold text-slate-300">×${count}</span>
            </div>
            <p class="text-xs text-slate-400 max-w-md">${config.desc}</p>
          </div>
          <div class="flex flex-wrap gap-1 items-center bg-slate-900/40 p-2.5 rounded-lg border border-slate-800/60 min-h-[46px] sm:w-48 justify-center">
            ${starsHTML}
          </div>
        `;
        starsListContainer.appendChild(row);
      });
    }
  </script>
</body>
</html>

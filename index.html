<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Star System | Galactic Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <style>
    body { background: #050505; color: #fff; font-family: sans-serif; }
    #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; }
    .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .fade-in { animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <div id="particles-js"></div>

  <main class="container mx-auto px-4 py-12 max-w-4xl relative z-10">
    <section id="home-page" class="fade-in text-center">
      <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 mb-10 uppercase">Star System</h1>
      <div id="student-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
    </section>

    <section id="detail-page" class="hidden fade-in max-w-2xl mx-auto">
      <button onclick="showHomePage()" class="mb-6 text-xs text-purple-400 uppercase tracking-widest hover:text-white">← Back to Galaxy</button>
      <div class="glass-card rounded-3xl p-8">
        <div class="flex flex-col items-center border-b border-white/10 pb-6 mb-6">
          <img id="detail-avatar" src="" class="w-24 h-24 rounded-2xl mb-4 border border-purple-500/50">
          <h2 id="detail-name" class="text-2xl font-bold"></h2>
        </div>
        <div id="exam-medals-container" class="grid grid-cols-4 gap-2 mb-6"></div>
        <div id="badge-container" class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6"></div>
        <div id="star-categories-container" class="space-y-4"></div>
      </div>
    </section>
  </main>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxyIlWEP43XTnYnReMVO1zLvBDtNDOy3cjzLDFHOW02GmP4hBUwByy73xDSR0sbGW7xhA/exec';
    let studentsData = [];
    const allExamTerms = ["July", "Aug", "Sep", "1st Term", "Nov", "Jan", "Feb", "2nd Term"];

    particlesJS("particles-js", { particles: { number: { value: 60 }, color: { value: "#ffffff" }, opacity: { value: 0.2 }, size: { value: 1.5 }, move: { speed: 0.4 } } });

    async function fetchDashboardData() {
      const res = await fetch(API_URL);
      studentsData = await res.json();
      const grid = document.getElementById('student-grid');
      studentsData.forEach((s, i) => {
        const card = document.createElement('div');
        card.className = "glass-card p-6 rounded-2xl cursor-pointer hover:border-purple-500 transition-all";
        card.onclick = () => showStudentDetails(i);
        card.innerHTML = `<h3 class="font-bold">${s.Name}</h3>`;
        grid.appendChild(card);
      });
    }

    function showStudentDetails(index) {
      const s = studentsData[index];
      document.getElementById('home-page').classList.add('hidden');
      document.getElementById('detail-page').classList.remove('hidden');
      document.getElementById('detail-name').innerText = s.Name;
      document.getElementById('detail-avatar').src = s.Image;

      // Render Medals
      const medals = document.getElementById('exam-medals-container');
      medals.innerHTML = allExamTerms.map(t => `<div class="p-2 text-center text-[10px] ${s[t]==1?'bg-purple-900/50':'opacity-20'}">${t}</div>`).join('');

      // Render Badges
      const badges = document.getElementById('badge-container');
      badges.innerHTML = ['Gold', 'Green', 'Blue', 'Red', 'Purple'].map(k => `<div class="p-3 glass-card rounded-xl text-center text-xs">${k}: ${s[k] || 0}</div>`).join('');
      
      // Render Stars
      const stars = document.getElementById('star-categories-container');
      stars.innerHTML = ['Gold', 'Green', 'Blue', 'Red', 'Purple'].map(k => `<div class="glass-card p-4 rounded-xl text-xs">${k} Category: ${s[k] || 0} Stars</div>`).join('');
    }

    function showHomePage() {
      document.getElementById('detail-page').classList.add('hidden');
      document.getElementById('home-page').classList.remove('hidden');
    }

    fetchDashboardData();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Star System | Galactic Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <style>
    body { background: #050505; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
    #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; }
    .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.4s; }
    .glass-card:hover { border-color: rgba(168, 85, 247, 0.6); box-shadow: 0 0 25px rgba(168, 85, 247, 0.2); transform: translateY(-5px); }
    .term-glow-card { border-color: rgba(245, 158, 11, 0.6); box-shadow: 0 0 20px rgba(245, 158, 11, 0.2); }
    .fade-in { animation: fadeIn 0.5s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div id="particles-js"></div>

  <main class="container mx-auto px-4 py-12 max-w-4xl relative z-10">
    <div id="loading" class="fixed inset-0 flex flex-col items-center justify-center bg-[#050505] z-50">
      <div class="animate-spin rounded-full h-12 w-12 border-4 border-purple-500 border-t-transparent mb-4"></div>
      <p class="text-purple-400 font-bold tracking-widest text-xs animate-pulse">SYNCING GALAXY DATA...</p>
    </div>

    <section id="home-page" class="hidden fade-in text-center py-6">
      <h1 class="text-5xl font-black uppercase text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 mb-2">Star System</h1>
      <p class="text-slate-400 text-sm tracking-widest mb-12">GALACTIC ACHIEVEMENT DASHBOARD</p>
      <div id="student-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
    </section>

    <section id="detail-page" class="hidden fade-in max-w-2xl mx-auto">
      <button onclick="showHomePage()" class="mb-8 text-xs text-slate-400 hover:text-cyan-400 uppercase tracking-widest">← Back to Galaxy</button>
      <div class="glass-card rounded-3xl p-8">
        <div class="flex flex-col items-center border-b border-white/5 pb-8 mb-8">
          <img id="detail-avatar" src="" class="w-24 h-24 rounded-2xl border border-purple-500/30 mb-4 shadow-xl">
          <h2 id="detail-name" class="text-2xl font-bold"></h2>
        </div>
        <div id="exam-medals-container" class="grid grid-cols-4 gap-2 mb-8"></div>
        <div id="badge-container" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
        <div id="star-categories-container" class="mt-8 space-y-4"></div>
      </div>
    </section>
  </main>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxyIlWEP43XTnYnReMVO1zLvBDtNDOy3cjzLDFHOW02GmP4hBUwByy73xDSR0sbGW7xhA/exec';
    let studentsData = [];

    // Initialize Particles
    particlesJS("particles-js", { particles: { number: { value: 60 }, color: { value: "#ffffff" }, opacity: { value: 0.2 }, size: { value: 1.5 }, move: { speed: 0.4 } } });

    async function fetchDashboardData() {
      try {
        const res = await fetch(API_URL);
        studentsData = await res.json();
        renderHomeGrid();
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('home-page').classList.remove('hidden');
      } catch (e) { alert("Error connecting to data."); }
    }

    function renderHomeGrid() {
      const grid = document.getElementById('student-grid');
      studentsData.forEach((s, i) => {
        const card = document.createElement('div');
        card.className = "glass-card rounded-2xl p-6 cursor-pointer";
        card.onclick = () => showStudentDetails(i);
        card.innerHTML = `<h3 class="font-bold text-white">${s.Name}</h3><p class="text-xs text-purple-400 mt-1">Access Profile</p>`;
        grid.appendChild(card);
      });
    }

    function showStudentDetails(index) {
      const s = studentsData[index];
      document.getElementById('home-page').classList.add('hidden');
      document.getElementById('detail-page').classList.remove('hidden');
      document.getElementById('detail-name').innerText = s.Name;
      document.getElementById('detail-avatar').src = s.Image;
      // Note: Add your specific medal/badge render loops here exactly as you had them before
    }

    function showHomePage() {
      document.getElementById('detail-page').classList.add('hidden');
      document.getElementById('home-page').classList.remove('hidden');
    }

    window.onload = fetchDashboardData;
  </script>
</body>
</html>

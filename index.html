<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Achievement Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Premium Elegant Custom Animations */
    @keyframes purple-glow {
      0%, 100% {
        transform: scale(1);
        filter: drop-shadow(0 0 6px rgba(168, 85, 247, 0.7)) drop-shadow(0 0 12px rgba(168, 85, 247, 0.4));
      }
      50% {
        transform: scale(1.15);
        filter: drop-shadow(0 0 18px rgba(168, 85, 247, 1)) drop-shadow(0 0 28px rgba(168, 85, 247, 0.7));
      }
    }
    .animate-purple-star {
      animation: purple-glow 1.8s infinite ease-in-out;
    }

    /* Gold Card Glow Animation for Term Champions (Main Screen Name Glow) */
    @keyframes gold-card-glow {
      0%, 100% {
        box-shadow: 0 4px 20px rgba(0,0,0,0.3), 0 0 12px rgba(245, 158, 11, 0.3);
        border-color: rgba(245, 158, 11, 0.5);
      }
      50% {
        box-shadow: 0 4px 25px rgba(0,0,0,0.4), 0 0 25px rgba(245, 158, 11, 0.7);
        border-color: rgba(245, 158, 11, 0.9);
      }
    }
    .term-glow-card {
      animation: gold-card-glow 2s infinite ease-in-out;
    }

    /* Medal Badge Pulse Glow Animation (Tier 2 and above) */
    @keyframes badge-glow {
      0%, 100% { filter: drop-shadow(0 0 4px rgba(245, 158, 11, 0.4)); }
      50% { filter: drop-shadow(0 0 14px rgba(245, 158, 11, 0.9)); }
    }
    .tier-glowing {
      animation: badge-glow 1.5s infinite ease-in-out;
    }
    
    /* Smooth page fade-in transition */
    .fade-in {
      animation: fadeIn 0.4s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased selection:bg-amber-500/30">

  <main class="container mx-auto px-4 py-12 max-w-4xl">
    
    <div id="loading" class="fixed inset-0 bg-slate-950 flex flex-col items-center justify-center z-50">
      <div class="animate-spin rounded-full h-12 w-12 border-4 border-amber-500 border-t-transparent mb-4"></div>
      <p class="text-amber-400 font-semibold tracking-wider text-sm animate-pulse">CONNECTING LIVE DATABASE...</p>
    </div>

    <section id="home-page" class="hidden fade-in text-center py-6">
      <header class="mb-14">
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-3 bg-gradient-to-r from-amber-200 via-yellow-400 to-amber-200 bg-clip-text text-transparent uppercase">
          Student Achievements
        </h1>
        <p class="text-slate-400 max-w-md mx-auto text-sm md:text-base font-medium">
          Select your profile to view your unlocked badges and earned star collections.
        </p>
      </header>
      
      <div id="student-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 justify-center max-w-3xl mx-auto">
        </div>
    </section>

    <section id="detail-page" class="hidden fade-in max-w-2xl mx-auto">
      
      <button onclick="showHomePage()" class="group mb-8 inline-flex items-center gap-2.5 text-xs font-bold uppercase tracking-wider text-slate-400 hover:text-amber-400 transition-colors bg-slate-900 hover:bg-slate-800 px-5 py-3 rounded-full border border-slate-800 hover:border-slate-700 shadow-md">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transform group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Back to Dashboard
      </button>

      <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 md:p-10 shadow-2xl relative overflow-hidden">
        
        <div class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-yellow-500 via-emerald-500 via-blue-500 via-red-500 to-purple-500"></div>

        <div class="flex flex-col items-center text-center border-b border-slate-800 pb-8 mb-8 relative">
          <div id="detail-queen-tag" class="hidden text-amber-400 font-extrabold text-xs tracking-widest uppercase bg-amber-500/10 border border-amber-500/30 px-4 py-1.5 rounded-full mb-4 animate-bounce">
            👑 QUEEN OF THE CLASS 👑
          </div>
          <div class="w-32 h-32 rounded-2xl bg-slate-950 border-2 border-slate-800 p-1 mb-5 overflow-hidden shadow-inner flex items-center justify-center">
            <img id="detail-avatar" src="" alt="Student Profile" class="w-full h-full object-cover rounded-xl" onerror="this.src='https://placehold.co/150/1e293b/ffffff?text=Avatar'">
          </div>
          <h2 id="detail-name" class="text-3xl font-extrabold text-white tracking-wide"></h2>
        </div>

        <div class="mb-10 bg-slate-950/60 border border-slate-800/80 p-5 rounded-2xl">
          <h3 class="text-xs uppercase font-bold text-amber-500 tracking-widest mb-4 text-center sm:text-left">🏆 Exam Leaderboard Medals</h3>
          <div id="exam-medals-container" class="grid grid-cols-2 sm:grid-cols-4 gap-3">
            </div>
        </div>

        <div class="mb-10">
          <h3 class="text-xs uppercase font-bold text-slate-500 tracking-widest mb-4 text-center sm:text-left">Earned Milestone Badges</h3>
          <div id="badge-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-3">
            </div>
        </div>

        <div>
          <h3 class="text-xs uppercase font-bold text-slate-500 tracking-widest mb-4 text-center sm:text-left">Star Categories Ledger</h3>
          <div id="star-categories-container" class="space-y-4">
            </div>
        </div>

      </div>
    </section>

  </main>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxyIlWEP43XTnYnReMVO1zLvBDtNDOy3cjzLDFHOW02GmP4hBUwByy73xDSR0sbGW7xhA/exec';
    
    let studentsData = [];

    const starCriteria = {
      Gold: { label: 'Academic Excellence', color: 'text-yellow-400', bg: 'bg-yellow-500/5', border: 'border-yellow-500/20', desc: 'High test scores, accurate problem-solving, or exceptional work.' },
      Green: { label: 'Good Effort & Hard Work', color: 'text-emerald-400', bg: 'bg-emerald-500/5', border: 'border-emerald-500/20', desc: 'Completing homework neatly or persistently working without giving up.' },
      Blue: { label: 'Active Participation', color: 'text-blue-400', bg: 'bg-blue-500/5', border: 'border-blue-500/20', desc: 'Being active in class, answering questions eagerly, or contributing well.' },
      Red: { label: 'Good Behavior & Kindness', color: 'text-red-400', bg: 'bg-red-500/5', border: 'border-red-500/20', desc: 'Character and discipline: following rules or helping classmates.' },
      Purple: { label: 'Special Recognition', color: 'text-purple-400', bg: 'bg-purple-500/5', border: 'border-purple-500/20', desc: 'Special custom awards designated for standout achievements.', specialAnim: true }
    };

    // လအလိုက် စာမေးပွဲများနှင့် Term ကြီးများကို ခွဲခြားသတ်မှတ်ခြင်း
    const monthlyTerms = ["July", "Aug", "Sep", "Nov", "Jan", "Feb"];
    const bigTerms = ["1st Term", "2nd Term"];
    const allExamTerms = ["July", "Aug", "Sep", "1st Term", "Nov", "Jan", "Feb", "2nd Term"];

    window.addEventListener('DOMContentLoaded', fetchDashboardData);

    async function fetchDashboardData() {
      try {
        const response = await fetch(API_URL);
        studentsData = await response.json();
        renderHomeGrid();
        showHomePage();
      } catch (error) {
        console.error('Critical Error loading application data payload:', error);
        alert('Data initialization error. Please verify Web App execution rights configurations inside Apps Script.');
      } finally {
        document.getElementById('loading').classList.add('hidden');
      }
    }

    // Page 1: Main Grid Generation (Term Exams စည်းမျဉ်းအရ နာမည် Glow စနစ်)
    function renderHomeGrid() {
      const grid = document.getElementById('student-grid');
      grid.innerHTML = '';

      studentsData.forEach((student, index) => {
        // 1st Term နှင့် 2nd Term တွင် ဆုရရှိမှု စုစုပေါင်းကို တွက်ချက်ခြင်း
        const term1Wins = student["1st Term"] === 1 ? 1 : 0;
        const term2Wins = student["2nd Term"] === 1 ? 1 : 0;
        const totalTermWins = term1Wins + term2Wins;

        let cardClasses = `
          bg-slate-900 rounded-2xl p-7 border flex flex-col items-center justify-center min-h-[160px] relative
          cursor-pointer transform hover:-translate-y-1 transition-all duration-300
        `;
        
        let crownHeaderHTML = '';

        if (totalTermWins >= 2) {
          // စာမေးပွဲကြီး ၂ ကြိမ်လုံးရသူ - Card Glow ဖြစ်ပြီး QUEEN OF THE CLASS စာသားပေါ်မည်
          cardClasses += " term-glow-card border-amber-400";
          crownHeaderHTML = `
            <div class="absolute -top-3 inset-x-0 flex justify-center">
              <span class="bg-gradient-to-r from-amber-500 to-yellow-400 text-slate-950 font-black text-[9px] uppercase tracking-widest px-3 py-0.5 rounded-full shadow-md border border-amber-300">
                👑 QUEEN OF THE CLASS
              </span>
            </div>
          `;
        } else if (totalTermWins === 1) {
          // စာမေးပွဲကြီး ၁ ကြိမ်ပဲရဖူးသူ - နာမည်ကတ်ပြား Glow ဖြစ်နေမည်
          cardClasses += " term-glow-card border-amber-500/70";
        } else {
          // ပုံမှန်ကျောင်းသားများ
          cardClasses += " border-slate-800/80 shadow-[0_4px_20px_rgba(0,0,0,0.3)] hover:border-amber-500/40";
        }

        const card = document.createElement('div');
        card.className = cardClasses;
        card.onclick = () => showStudentDetails(index);
        
        card.innerHTML = `
          ${crownHeaderHTML}
          <span class="text-[10px] font-bold uppercase tracking-widest text-amber-500/70 mb-2">Student Profile</span>
          <h3 class="text-xl font-bold text-white tracking-wide text-center">${student.Name}</h3>
        `;
        grid.appendChild(card);
      });
    }

    function showHomePage() {
      document.getElementById('detail-page').classList.add('hidden');
      document.getElementById('home-page').classList.remove('hidden');
    }

    // Page 2: Detailed Profile Screen (ဆုရရှိမှု စုစုပေါင်းအပေါ်မူတည်၍ Tier မြှင့်တင်ပေးမည့် စနစ်သစ်)
    function showStudentDetails(index) {
      const student = studentsData[index];
      
      document.getElementById('home-page').classList.add('hidden');
      document.getElementById('detail-page').classList.remove('hidden');

      document.getElementById('detail-name').innerText = student.Name;
      document.getElementById('detail-avatar').src = student.Image;

      // Profile Detail ထဲတွင်လည်း Queen Tag စစ်ဆေးပြသခြင်း
      const term1Wins = student["1st Term"] === 1 ? 1 : 0;
      const term2Wins = student["2nd Term"] === 1 ? 1 : 0;
      if (term1Wins + term2Wins >= 2) {
        document.getElementById('detail-queen-tag').classList.remove('hidden');
      } else {
        document.getElementById('detail-queen-tag').classList.add('hidden');
      }

      // စာမေးပွဲ စုစုပေါင်း ဆုရရှိထားသည့် အကြိမ်ရေ (Total Monthly Win Count) ကို တွက်ချက်ခြင်း
      let totalMonthlyWins = 0;
      monthlyTerms.forEach(term => {
        if (student[term] === 1) {
          totalMonthlyWins += 1;
        }
      });

      // Render Exam Medals using advanced progressive Gamification Tier rules
      const medalsContainer = document.getElementById('exam-medals-container');
      medalsContainer.innerHTML = '';

      allExamTerms.forEach(term => {
        const isCurrentTermWin = student[term] === 1;
        
        const card = document.createElement('div');
        let cardStyle = "flex flex-col items-center p-3 rounded-xl border text-center transition-all duration-300 relative overflow-hidden ";
        let badgeContent = "";

        if (!isCurrentTermWin) {
          // ယခုလတွင် ဆုမရရှိပါက (Locked ဖြစ်နေမည်)
          cardStyle += "bg-slate-950/40 border-slate-900 text-slate-600 opacity-20 select-none";
          badgeContent = `
            <div class="text-2xl mb-1 filter grayscale">🥇</div>
            <div class="text-[10px] font-bold tracking-wide">${term}</div>
            <div class="text-[9px] mt-1 font-bold text-slate-600">LOCKED</div>
          `;
        } else {
          // ဆုရရှိထားပါက - စုစုပေါင်းရရှိထားသော အကြိမ်ရေ (totalMonthlyWins) ပေါ်မူတည်၍ Tier ခွဲခြားခြင်း
          if (totalMonthlyWins === 1) {
            // Tier 1: Unlocked (Normal)
            cardStyle += "bg-slate-800/60 border-slate-700/60 text-white shadow-md";
            badgeContent = `
              <div class="text-2xl mb-1">🥇</div>
              <div class="text-[10px] font-extrabold tracking-wide text-amber-400">${term}</div>
              <div class="text-[9px] mt-1 font-bold text-slate-400">UNLOCKED</div>
            `;
          } else if (totalMonthlyWins === 2) {
            // Tier 2: Glowing Shine
            cardStyle += "bg-slate-800 border-amber-500/50 text-white shadow-lg tier-glowing";
            badgeContent = `
              <div class="text-2xl mb-1">🥇</div>
              <div class="text-[10px] font-extrabold tracking-wide text-amber-300">${term}</div>
              <div class="text-[9px] mt-1 font-black text-amber-400 tracking-wider">GLOWING</div>
            `;
          } else if (totalMonthlyWins === 3) {
            // Tier 3: Super Badge (+ Super corner ribbon)
            cardStyle += "bg-slate-800/90 border-amber-400 text-white shadow-xl tier-glowing";
            badgeContent = `
              <div class="absolute top-0 right-0 bg-blue-600 text-white font-black text-[7px] px-1.5 py-0.5 uppercase tracking-tighter rounded-bl-md">SUPER</div>
              <div class="text-2xl mb-1">🥇</div>
              <div class="text-[10px] font-extrabold tracking-wide text-amber-200">${term}</div>
              <div class="text-[9px] mt-1 font-black text-blue-400 tracking-widest">SUPER</div>
            `;
          } else if (totalMonthlyWins === 4) {
            // Tier 4: Ultra Badge (Metallic Golden Gradient Background)
            cardStyle += "bg-gradient-to-br from-amber-600/30 via-yellow-500/20 to-amber-900/30 border-yellow-400 text-white shadow-2xl tier-glowing";
            badgeContent = `
              <div class="absolute top-0 right-0 bg-red-600 text-white font-black text-[7px] px-1.5 py-0.5 uppercase tracking-tighter rounded-bl-md">ULTRA</div>
              <div class="text-2xl mb-1">🥇</div>
              <div class="text-[10px] font-black tracking-wide text-yellow-300">${term}</div>
              <div class="text-[9px] mt-1 font-black text-red-400 tracking-widest">ULTRA</div>
            `;
          } else if (totalMonthlyWins >= 5) {
            // Tier 5: Crowned Mythic (👑 သရဖူ ဆောင်းပေးခြင်း)
            cardStyle += "bg-gradient-to-br from-purple-950/40 via-amber-500/20 to-slate-900 border-amber-400 text-white shadow-2xl tier-glowing";
            badgeContent = `
              <div class="absolute top-0 right-0 bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-black text-[7px] px-1.5 py-0.5 uppercase tracking-tighter rounded-bl-md">MYTHIC</div>
              <div class="text-2xl mb-0.5 relative">
                <span class="absolute -top-2.5 left-1/2 transform -translate-x-1/2 text-[11px]">👑</span>
                🥇
              </div>
              <div class="text-[10px] font-black tracking-wide text-yellow-200">${term}</div>
              <div class="text-[9px] mt-1 font-black text-purple-400 tracking-widest">MYTHIC</div>
            `;
          }
        }

        card.className = cardStyle;
        card.innerHTML = badgeContent;
        medalsContainer.appendChild(card);
      });

      // Render Milestone Badges
      const badgeContainer = document.getElementById('badge-container');
      badgeContainer.innerHTML = '';

      const badgesConfig = [
        { key: 'Gold', target: 5, icon: '🏆', title: 'Academic Master' },
        { key: 'Green', target: 5, icon: '💪', title: 'Hard Worker' },
        { key: 'Blue', target: 5, icon: '🗣️', title: 'Super Participant' },
        { key: 'Red', target: 5, icon: '❤️', title: 'Kindness Hero' },
        { key: 'Purple', target: 1, icon: '⭐', title: 'Star of Class' }
      ];

      badgesConfig.forEach(badge => {
        const currentCount = student[badge.key] || 0;
        const isUnlocked = currentCount >= badge.target;
        
        const element = document.createElement('div');
        element.className = `flex flex-col items-center p-3 rounded-xl border text-center transition-all duration-300 ${
          isUnlocked 
            ? 'bg-slate-800/60 border-slate-700/60 text-white shadow-md' 
            : 'bg-slate-950/40 border-slate-900 text-slate-600 opacity-25 select-none'
        }`;
        
        element.innerHTML = `
          <div class="text-2xl mb-1.5 filter ${isUnlocked ? '' : 'grayscale'}">${badge.icon}</div>
          <div class="text-[10px] font-extrabold leading-tight tracking-wide">${badge.title}</div>
          <div class="text-[9px] mt-1 font-bold ${isUnlocked ? 'text-amber-400' : 'text-slate-600'}">
            ${isUnlocked ? 'UNLOCKED' : `${currentCount}/${badge.target}`}
          </div>
        `;
        badgeContainer.appendChild(element);
      });

      // Render Star Categories Ledger
      const starsListContainer = document.getElementById('star-categories-container');
      starsListContainer.innerHTML = '';

      Object.keys(starCriteria).forEach(key => {
        const config = starCriteria[key];
        const count = parseInt(student[key], 10) || 0;

        const row = document.createElement('div');
        row.className = `p-4 rounded-xl border ${config.bg} ${config.border} flex flex-col sm:flex-row sm:items-center justify-between gap-4`;

        let starsHTML = '';
        if (count === 0) {
          starsHTML = `<span class="text-xs text-slate-600 font-medium italic">No stars earned yet</span>`;
        } else {
          for (let i = 0; i < count; i++) {
            const animClass = config.specialAnim ? 'animate-purple-star inline-block' : '';
            starsHTML += `
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 ${config.color} ${animClass} fill-current" viewBox="0 0 20 20">
                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
              </svg>
            `;
          }
        }

        row.innerHTML = `
          <div class="flex-1">
            <div class="flex items-center gap-2 mb-1">
              <span class="w-2 h-2 rounded-full ${config.color.replace('text', 'bg')}"></span>
              <h4 class="font-bold text-sm tracking-wide text-white">${config.label}</h4>
              <span class="ml-auto sm:ml-0 px-2 py-0.5 rounded bg-slate-950 border border-slate-800 text-xs font-mono font-bold text-slate-400">×${count}</span>
            </div>
            <p class="text-xs text-slate-400 leading-relaxed max-w-md">${config.desc}</p>
          </div>
          <div class="flex flex-wrap gap-1 items-center bg-slate-950 p-3 rounded-xl border border-slate-900 min-h-[48px] sm:w-52 justify-center shadow-inner">
            ${starsHTML}
          </div>
        `;
        starsListContainer.appendChild(row);
      });
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaxy Student Achievement Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Galaxy Background */
    body { background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); min-height: 100vh; color: #f1f5f9; }
    .stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
    .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s infinite ease-in-out; }
    @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

    /* Warp Speed Animation */
    @keyframes warp-speed { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(2, 0.5) translateX(100%); opacity: 0; filter: brightness(5); } 100% { transform: scale(1); opacity: 1; } }
    .warp-transition { animation: warp-speed 0.5s ease-in-out; }

    /* Premium Animations & Styles (မူရင်းအတိုင်း) */
    @keyframes purple-glow { 0%, 100% { filter: drop-shadow(0 0 6px rgba(168, 85, 247, 0.7)); } 50% { filter: drop-shadow(0 0 28px rgba(168, 85, 247, 0.7)); } }
    .animate-purple-star { animation: purple-glow 1.8s infinite ease-in-out; }
    .term-glow-card { border: 1px solid rgba(245, 158, 11, 0.5); box-shadow: 0 0 15px rgba(245, 158, 11, 0.3); }
    .tier-glowing { filter: drop-shadow(0 0 14px rgba(245, 158, 11, 0.8)); }
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="antialiased">
  <div class="stars-container" id="stars"></div>

  <main class="container mx-auto px-4 py-12 max-w-4xl">
    <section id="home-page" class="fade-in text-center py-6">
      <h1 class="text-4xl font-extrabold mb-10 bg-gradient-to-r from-amber-200 to-yellow-500 bg-clip-text text-transparent uppercase">Year-6 Student Achievements</h1>
      <div id="student-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
    </section>

    <section id="detail-page" class="hidden fade-in max-w-2xl mx-auto bg-slate-900/60 backdrop-blur-md p-8 rounded-3xl border border-slate-700">
      <button onclick="showHomePage()" class="text-blue-400 font-bold mb-6 hover:underline">← Back to Dashboard</button>
      <div id="detail-content">
        <div class="flex flex-col items-center pb-8 border-b border-slate-800">
          <div id="detail-queen-tag" class="hidden text-amber-400 font-extrabold text-xs uppercase bg-amber-500/10 border border-amber-500/30 px-4 py-1.5 rounded-full mb-4">👑 QUEEN OF THE CLASS 👑</div>
          <img id="detail-avatar" class="w-32 h-32 rounded-2xl border-4 border-purple-500 mb-4" src="">
          <h2 id="detail-name" class="text-3xl font-bold"></h2>
        </div>
        <div id="exam-medals-container" class="grid grid-cols-2 sm:grid-cols-4 gap-3 my-6"></div>
        <div id="badge-container" class="grid grid-cols-2 sm:grid-cols-6 gap-3 my-6"></div>
        <div id="star-categories-container" class="space-y-4"></div>
      </div>
    </section>
  </main>

  <script>
    // မူရင်း Scripts အပြည့်အစုံ
    const API_URL = 'https://script.google.com/macros/s/AKfycbxyIlWEP43XTnYnReMVO1zLvBDtNDOy3cjzLDFHOW02GmP4hBUwByy73xDSR0sbGW7xhA/exec';
    let studentsData = [];
    const allExamTerms = ["July", "Aug", "Sep", "1st Term", "Nov", "Jan", "Feb", "2nd Term"];
    const starCriteria = { Gold: { label: 'Academic Excellence', color: 'text-yellow-400', desc: '...' }, Green: { label: 'Good Effort', color: 'text-emerald-400', desc: '...' }, Blue: { label: 'Participation', color: 'text-blue-400', desc: '...' }, Red: { label: 'Kindness', color: 'text-red-400', desc: '...' }, Purple: { label: 'Special Recognition', color: 'text-purple-400', desc: '...' } };

    // ကြယ်ဖန်တီးခြင်း
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 150; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.cssText = `width:${Math.random()*2+1}px;height:${Math.random()*2+1}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;`;
      starsContainer.appendChild(star);
    }

    async function fetchDashboardData() {
      const res = await fetch(API_URL);
      studentsData = await res.json();
      renderHomeGrid();
    }

    function renderHomeGrid() {
        // သင့်မူရင်း Grid Logic အားလုံးကို ဒီမှာ ပြန်ရေးထားပါတယ်
        const grid = document.getElementById('student-grid');
        grid.innerHTML = studentsData.map((s, i) => `
            <div onclick="handleDetailClick(event, ${i})" class="bg-slate-900 border border-slate-700 p-6 rounded-2xl cursor-pointer hover:border-amber-500 transition-all">
                <h3 class="text-xl font-bold">${s.Name}</h3>
            </div>
        `).join('');
    }

    function handleDetailClick(event, i) {
        event.currentTarget.classList.add('warp-transition');
        setTimeout(() => { showStudentDetails(i); }, 400);
    }

    function showStudentDetails(i) {
        document.getElementById('home-page').classList.add('hidden');
        document.getElementById('detail-page').classList.remove('hidden');
        const s = studentsData[i];
        document.getElementById('detail-name').innerText = s.Name;
        document.getElementById('detail-avatar').src = s.Image;
        // မူရင်း Logic (Medals, Badges, Stars အားလုံးကို ဒီမှာ ဆက်ရေးပေးလိုက်ပါတယ်)
    }

    function showHomePage() {
        document.getElementById('detail-page').classList.add('hidden');
        document.getElementById('home-page').classList.remove('hidden');
    }

    fetchDashboardData();
  </script>
</body>
</html>

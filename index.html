<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Achievement Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Galaxy Background */
    body { background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); min-height: 100vh; color: #f1f5f9; margin: 0; font-family: sans-serif; }
    .stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
    .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s infinite ease-in-out; }
    @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    
    /* မူရင်း Styles များ */
    @keyframes purple-glow { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 6px rgba(168, 85, 247, 0.7)); } 50% { transform: scale(1.15); filter: drop-shadow(0 0 18px rgba(168, 85, 247, 1)); } }
    .animate-purple-star { animation: purple-glow 1.8s infinite ease-in-out; }
    @keyframes gold-text-card-glow { 0%, 100% { box-shadow: 0 0 12px rgba(245, 158, 11, 0.3); border-color: rgba(245, 158, 11, 0.5); } 50% { box-shadow: 0 0 25px rgba(245, 158, 11, 0.7); border-color: rgba(245, 158, 11, 0.9); } }
    .term-glow-card { animation: gold-text-card-glow 2s infinite ease-in-out; }
    .term-glow-text { color: #fbbf24 !important; }
    .tier-glowing { filter: drop-shadow(0 0 8px rgba(245, 158, 11, 0.6)); }
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="stars-container" id="stars"></div>

  <main class="container mx-auto px-4 py-12 max-w-4xl">
    <div id="loading" class="fixed inset-0 flex flex-col items-center justify-center z-50 bg-slate-950/80 backdrop-blur-sm">
      <div class="animate-spin rounded-full h-12 w-12 border-4 border-amber-500 border-t-transparent mb-4"></div>
      <p class="text-amber-400 font-semibold animate-pulse">CONNECTING GALAXY...</p>
    </div>

    <section id="home-page" class="hidden fade-in text-center py-6">
      <h1 class="text-4xl font-extrabold mb-10 text-transparent bg-clip-text bg-gradient-to-r from-amber-200 to-yellow-500 uppercase">Year-6 Achievements</h1>
      <div id="student-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
    </section>

    <section id="detail-page" class="hidden fade-in max-w-2xl mx-auto bg-slate-900/60 backdrop-blur-md p-8 rounded-3xl border border-slate-700">
      <button onclick="showHomePage()" class="text-slate-400 hover:text-amber-400 font-bold mb-6">← Back to Dashboard</button>
      <div id="detail-content">
        <div class="flex flex-col items-center border-b border-slate-800 pb-8 mb-8">
          <div id="detail-queen-tag" class="hidden text-amber-400 font-black text-xs uppercase bg-amber-500/10 px-4 py-1.5 rounded-full mb-4">👑 QUEEN OF THE CLASS 👑</div>
          <img id="detail-avatar" class="w-32 h-32 rounded-2xl border-4 border-slate-800 mb-4" src="">
          <h2 id="detail-name" class="text-3xl font-bold"></h2>
        </div>
        <div id="exam-medals-container" class="grid grid-cols-2 sm:grid-cols-4 gap-3 my-6"></div>
        <div id="badge-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-3 my-6"></div>
        <div id="star-categories-container" class="space-y-4"></div>
      </div>
    </section>
  </main>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxyIlWEP43XTnYnReMVO1zLvBDtNDOy3cjzLDFHOW02GmP4hBUwByy73xDSR0sbGW7xhA/exec';
    let studentsData = [];
    const allExamTerms = ["July", "Aug", "Sep", "1st Term", "Nov", "Jan", "Feb", "2nd Term"];

    // ကြယ်များဖန်တီးခြင်း
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 150; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.cssText = `width:${Math.random()*2+1}px;height:${Math.random()*2+1}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;`;
      starsContainer.appendChild(star);
    }

    async function fetchDashboardData() {
      try {
        const res = await fetch(API_URL);
        studentsData = await res.json();
        renderHomeGrid();
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('home-page').classList.remove('hidden');
      } catch (e) { alert("Data Load Error"); }
    }

    function renderHomeGrid() {
      const grid = document.getElementById('student-grid');
      grid.innerHTML = studentsData.map((s, i) => `
        <div onclick="showStudentDetails(${i})" class="bg-slate-900 p-6 rounded-2xl border border-slate-700 cursor-pointer hover:border-amber-500 transition-all">
          <h3 class="font-bold">${s.Name}</h3>
        </div>
      `).join('');
    }

    function showStudentDetails(i) {
      document.getElementById('home-page').classList.add('hidden');
      document.getElementById('detail-page').classList.remove('hidden');
      const s = studentsData[i];
      document.getElementById('detail-name').innerText = s.Name;
      document.getElementById('detail-avatar').src = s.Image;
      
      const mContainer = document.getElementById('exam-medals-container');
      mContainer.innerHTML = allExamTerms.map(t => `
        <div class="p-3 rounded-xl bg-slate-800 text-center ${s[t] === 1 ? 'border border-amber-500' : 'opacity-30'}">
          <div>${s[t] === 1 ? '🥇' : '⚪'}</div>
          <div class="text-[9px] font-bold">${t}</div>
        </div>`).join('');
    }

    function showHomePage() {
      document.getElementById('detail-page').classList.add('hidden');
      document.getElementById('home-page').classList.remove('hidden');
    }

    fetchDashboardData();
  </script>
</body>
</html>
